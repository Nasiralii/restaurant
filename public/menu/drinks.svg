<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Drinks menu image">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe2"/>
      <stop offset="0.55" stop-color="#f0d9b9"/>
      <stop offset="1" stop-color="#c28a52"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f1a14" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <g opacity="0.15">
    <circle cx="140" cy="120" r="100" fill="#1f1a14"/>
    <circle cx="690" cy="150" r="120" fill="#1f1a14"/>
    <circle cx="720" cy="520" r="140" fill="#1f1a14"/>
  </g>

  <g filter="url(#s)">
