    <path d="M310 150h180l-25 260c-5 50-48 90-100 90s-95-40-100-90l-25-260z" fill="#fbf7f0" opacity="0.95"/>
    <path d="M310 150h180l-20 210c-10 45-44 78-90 78s-80-33-90-78l-20-210z" fill="#c28a52" opacity="0.22"/>
    <!-- straw -->
    <path d="M470 110c20 35 26 60 18 85-6 18-20 30-30 40l-18-18c10-10 18-18 22-29 4-13 0-28-14-52l22-26z" fill="#1f1a14" opacity="0.18"/>
    <!-- citrus -->
    <circle cx="390" cy="300" r="30" fill="#fbf7f0" opacity="0.85"/>
    <circle cx="390" cy="300" r="18" fill="#c28a52" opacity="0.35"/>
    <path d="M390 270c14 10 24 25 24 45-18-5-33-15-45-30 7-10 13-15 21-15z" fill="#1f1a14" opacity="0.08"/>
  </g>

  <text x="400" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#1f1a14" opacity="0.9">Brew & Bite</text>
  <text x="400" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#5b4b3f">Drinks</text>
