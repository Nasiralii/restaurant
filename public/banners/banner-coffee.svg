  <g transform="translate(520,140)" opacity="0.95">
    <path d="M210 80h260l-45 300c-8 60-58 108-120 108s-112-48-120-108L210 80z" fill="#fbf7f0" opacity="0.85"/>
    <path d="M160 95c0-40 32-72 72-72h245c40 0 72 32 72 72v35H160V95z" fill="#fbf7f0" opacity="0.35"/>
