<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-label="Coffee banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1a14" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#7a4a2a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c28a52" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="70%">
      <stop offset="0" stop-color="#c28a52" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c28a52" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#bg)"/>
  <rect width="1600" height="700" fill="url(#glow)"/>

  <!-- coffee bean pattern -->
